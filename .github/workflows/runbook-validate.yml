name: Runbook Wiki Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'proof/runbook-wiki-native/**'

jobs:
  validate-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate wiki article frontmatter
        run: |
          python3 -c "
          import sys, glob
          REQUIRED = ['title', 'sources', 'related', 'tags', 'created', 'updated']
          errors = 0
          files = sorted(glob.glob('proof/runbook-wiki-native/wiki/*.md'))
          for f in files:
              content = open(f).read()
              if not content.startswith('---'):
                  print(f'FAIL {f}: no frontmatter', file=sys.stderr)
                  errors += 1
                  continue
              parts = content.split('---', 2)
              if len(parts) < 3:
                  print(f'FAIL {f}: malformed frontmatter', file=sys.stderr)
                  errors += 1
                  continue
              fm_text = parts[1]
              for field in REQUIRED:
                  if field + ':' not in fm_text:
                      print(f'FAIL {f}: missing field [{field}]', file=sys.stderr)
                      errors += 1
          print(f'Checked {len(files)} articles — {errors} error(s)')
          sys.exit(1 if errors else 0)
          "

  validate-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate index covers all articles
        run: |
          python3 -c "
          import os, sys, glob
          wiki_dir = 'proof/runbook-wiki-native/wiki'
          index_path = 'proof/runbook-wiki-native/index.md'
          index = open(index_path).read()
          files = [os.path.basename(f) for f in glob.glob(f'{wiki_dir}/*.md')]
          missing = [f for f in files if f not in index]
          if missing:
              print(f'INDEX FAIL: {len(missing)} files not in index:', file=sys.stderr)
              for m in missing:
                  print(f'  {m}', file=sys.stderr)
              sys.exit(1)
          print(f'Index OK: all {len(files)} files present')
          "

  replay-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run replay determinism check
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          python3 proof/runbook-wiki-native/materialize.py \
            --source proof/runbook-wiki-native/raw/cycle-receipts.ndjson \
            --output-dir /tmp/replay-wiki \
            --all \
            --wiki-compat \
            --ts-override "$TS" \
            | python3 -c "
          import sys, json
          results = [json.loads(l) for l in sys.stdin if l.strip()]
          print(f'Replay: {len(results)} articles materialized')
          "
